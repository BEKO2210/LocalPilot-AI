name: Deploy to GitHub Pages

# Wir deployen automatisch:
#  - bei jedem Push auf main
#  - bei jedem Push auf eine claude/* Feature-Branch (Live-Preview während der Entwicklung)
#  - manuell über den "Run workflow"-Button im GitHub-UI
on:
  push:
    branches:
      - main
      - "claude/**"
  workflow_dispatch:

# GitHub-Pages-Deployments brauchen genau diese drei Berechtigungen.
# Siehe https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site
permissions:
  contents: read
  pages: write
  id-token: write

# Niemals zwei Pages-Deployments parallel. Neue Runs auf gleicher Gruppe
# warten, statt halbe Deploys zu produzieren.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        env:
          STATIC_EXPORT: "true"
          # Repository-Name als basePath, damit Assets unter
          # https://<user>.github.io/<repo>/ korrekt aufgelöst werden.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Disable Jekyll for _next folder
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
